<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Jared Alon - Handcrafted furniture design and studio portfolio. Modern, sculptural, and heirloom-quality solid-wood furniture.">
    <title>{{title}} | Jared Alon</title>
    <!-- Google Fonts: Poppins (Body) and Jost (Futura-like alternative for fallback) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jost:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Poppins:wght@200;300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body class="{{body_class}}">
    <header class="site-header {{header_class}}">
        <div class="header-container">
            <a href="/index.html" class="logo">JARED ALON</a>
            <button class="mobile-nav-toggle" aria-label="Toggle navigation" aria-expanded="false" id="menuToggle">
                <span class="bar"></span>
                <span class="bar"></span>
            </button>
            <nav class="nav-menu" id="navMenu">
                <a href="/index.html" class="nav-link {{nav_active_home}}">Home</a>
                <a href="/projects.html" class="nav-link {{nav_active_projects}}">Projects</a>
                <a href="/gallery.html" class="nav-link {{nav_active_gallery}}">Gallery</a>
                <a href="/about.html" class="nav-link {{nav_active_about}}">About</a>
            </nav>
        </div>
    </header>

    <main class="main-content">
        {{content}}
    </main>

    <footer class="site-footer">
        <div class="footer-container">
            <div class="footer-brand">
                <h3>JARED ALON</h3>
                <p>Furniture Design & Craftsmanship</p>
            </div>
            <div class="footer-meta">
                <p>&copy; 2026 Jared Alon. All rights reserved.</p>
                <p>Handcrafted in Hudson Valley, NY</p>
            </div>
        </div>
    </footer>

    <script>
        // Mobile Navigation Toggle
        const menuToggle = document.getElementById('menuToggle');
        const navMenu = document.getElementById('navMenu');

        menuToggle.addEventListener('click', () => {
            const expanded = menuToggle.getAttribute('aria-expanded') === 'true';
            menuToggle.setAttribute('aria-expanded', !expanded);
            navMenu.classList.toggle('active');
            menuToggle.classList.toggle('active');
        });

        // Home hero: transparent header over cover, solid sticky header after scroll
        const overlayHeader = document.querySelector('.site-header--overlay');
        const heroSection = document.querySelector('.hero-section');

        if (overlayHeader && heroSection) {
            const updateHeaderState = () => {
                const heroBottom = heroSection.getBoundingClientRect().bottom;
                overlayHeader.classList.toggle('site-header--scrolled', heroBottom <= overlayHeader.offsetHeight);
            };

            window.addEventListener('scroll', updateHeaderState, { passive: true });
            window.addEventListener('resize', updateHeaderState);
            updateHeaderState();
        }
    </script>
</body>
</html>
